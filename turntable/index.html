<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义转盘生成器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- 标题栏 -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl md:text-4xl font-bold text-blue-600 mb-2">幸运大转盘</h1>
            <p class="text-gray-600">创建属于你专属的幸运转盘</p>
            <div class="mt-2 text-sm text-orange-500 font-medium">
                <i class="fa fa-star mr-1"></i> 作者: 夏帮路
            </div>
        </header>

        <!-- 主要内容区 -->
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- 左侧表单区域 -->
            <div class="lg:w-1/2 bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                    <i class="fa fa-sliders mr-2 text-blue-500"></i> 转盘设置
                </h2>
                
                <form id="wheelForm" class="space-y-4">
                    <!-- 转盘标题 -->
                    <div>
                        <label for="wheelTitle" class="block text-sm font-medium text-gray-700 mb-1">转盘标题</label>
                        <input type="text" id="wheelTitle" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="输入你的转盘标题" value="牙签肉吃屎去吧">
                    </div>
                    
                    <!-- 转盘选项 -->
                    <div>
                        <div class="flex items justify-between items-center mb-2">
                            <label class="block text-sm font-medium medium text-gray-700">转盘选项</label>
                            <button type="button" id="addOption" class="text-blue-500 hover:text-blue-700 text-sm flex items-center">
                                <i class="fa fa-plus-circle mr-1"></i> 添加选项
                            </button>
                        </div>
                        
                        <div id="optionsContainer" class="space-y-3">
                            <!-- 选项将通过JS动态添加 -->
                        </div>
                    </div>
                    
                    <!-- 旋转次数 -->
                    <div>
                        <label for="spinCount" class="block text-sm font-medium text-gray-700 mb-1">旋转次数</label>
                        <input type="number" id="spinCount" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" min="1" max="10" value="3">
                    </div>
                </form>
            </div>
            
            <!-- 右侧侧转盘区域 -->
            <div class="lg:w-1/2 flex flex flex-col items-center justify-center">
                <div class="relative-relative w-full max-w-md aspect-square">
                    <!-- 转盘容器 -->
                    <div id="wheelContainer" class="relative w-full aspect-square">
                        <canvas id="wheelCanvas" class="w-full h-full"></canvas>
                        <div id="wheelPointer" class="absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-1/4 w-0 h-0 border-l-[20px] border-r-[20px] border-b-[30px] border-l-transparent border-r-transparent border-b-orange-500 z-10"></div>
                        <div id="wheelTitleDisplay" class="absolute top-4 left-1/2 transform -translate-x-1/2 text-lg font-bold text-white text-shadow-lg z-10"></div>
                    </div>
                    
                    <!-- 结果显示 -->
                    <div id="resultDisplay" class="mt-6 text-center hidden">
                        <div class="bg-white rounded-lg shadow-md p-4">
                            <h3 class="text-xl font-bold text-blue-600 mb-2">恭喜！</h3>
                            <p class="text-gray-800 text-lg">你获得了：</p>
                            <p id="resultText" class="text-2xl font-bold text-orange-500 mt-2"></p>
                        </div>
                    </div>
                </div>
                
                <!-- 旋转按钮 -->
                <button id="spinButton" class="mt-8 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:ring-opacity-50 disabled:opacity-50 disabled:cursor-not-allowed flex items-center">
                    <i class="fa fa-refresh mr-2"></i> 开始旋转
                </button>
            </div>
        </div>
        
        <!-- 底部信息 -->
        <footer class="mt-12 text-center text-gray-500 text-sm">
            <p>© 2025 自定义转盘生成器 | 作者: 夏帮路</p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
